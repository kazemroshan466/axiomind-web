<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMIND ULTIMATE PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #151a22; --accent: #00e676; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #222c3a; }
        .tab-content { display: none; padding: 15px; }
        .active { display: block; }
        
        /* استایل ویجت‌ها */
        .widget-container { width: 100%; height: 600px; border-radius: 15px; overflow: hidden; background: var(--panel); }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; padding: 10px 0; border-top: 2px solid var(--accent); }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #8a96a3; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header"><h1>AXIOMIND <span style="color:var(--accent)">PRO</span></h1></div>

<div id="crypto" class="tab-content active">
    <div class="widget-container">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        { "width": "100%", "height": "100%", "defaultColumn": "overview", "screener_type": "crypto_mkt", "displayCurrency": "USD", "colorTheme": "dark" }
        </script>
    </div>
</div>

<div id="forex" class="tab-content">
    <div class="widget-container">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-cross-rates.js">
        { "width": "100%", "height": "100%", "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD"], "colorTheme": "dark" }
        </script>
    </div>
</div>

<div id="news" class="tab-content">
    <div class="widget-container">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js">
        { "width": "100%", "height": "100%", "feedMode": "market", "market": "crypto", "colorTheme": "dark" }
        </script>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item" onclick="openTab('crypto')"><i class="fas fa-coins"></i>Crypto</div>
    <div class="nav-item" onclick="openTab('forex')"><i class="fas fa-globe"></i>Forex</div>
    <div class="nav-item" onclick="openTab('news')"><i class="fas fa-newspaper"></i>News</div>
</div>

<script>
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    // تنظیمات مینی‌آپ تلگرام
    window.Telegram.WebApp.expand();
</script>
</body>
</html>
