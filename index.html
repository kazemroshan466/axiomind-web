<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AXIOMIND VIP PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --bg: #050505; --neon: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; }
        #app-content { display: block; }
        .timer-box { text-align: center; color: var(--neon); font-size: 14px; padding: 10px; border-bottom: 1px solid #333; }
        .widget-wrapper { height: 60vh; width: 100%; }
        .lock-screen { display: none; text-align: center; padding: 50px; height: 100vh; }
    </style>
</head>
<body>

    <div id="lock-screen" class="lock-screen">
        <h1><i class="fas fa-lock"></i> SESSION EXPIRED</h1>
        <p>Please contact support to renew your VIP access.</p>
    </div>

    <div id="app-content">
        <div class="timer-box" id="timer">Time Remaining: 01:00</div>
        
        <div class="widget-wrapper">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
            { "width": "100%", "height": "100%", "screener_type": "crypto_mkt", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <script>
        // سیستم مدیریت زمان (۱ دقیقه)
        let timeLeft = 60;
        const timerDisplay = document.getElementById('timer');
        const timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = "Time Remaining: 00:" + (timeLeft < 10 ? "0" : "") + timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'block';
            }
        }, 1000);

        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
