<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMIND Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a22;
            --accent-color: #00e676;
            --text-color: #ffffff;
            --text-muted: #8a96a3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            direction: ltr;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #222c3a;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }

        .header p {
            font-size: 11px;
            color: var(--text-muted);
            margin: 5px 0 0 0;
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .lang-btn {
            background: var(--card-bg);
            border: 1px solid #222c3a;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .lang-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .signal-container {
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pair {
            font-weight: bold;
            font-size: 18px;
        }

        .badge {
            background-color: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .target-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .target-info span {
            color: #fff;
            font-weight: 500;
        }

        .footer-btn {
            background: linear-gradient(135deg, #00e676, #00b0ff);
            color: #000;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="title">AXIOMIND</h1>
        <p id="subtitle">WE DECODE THE MARKET</p>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fa')">FA</button>
        <button class="lang-btn" onclick="setLanguage('bs')">BS</button>
    </div>

    <div class="signal-container">
        <div class="card">
            <div class="card-header">
                <span class="pair">BTC / USDT</span>
                <span class="badge" id="signal-type">BUY / LONG</span>
            </div>
            <div class="target-info">
                <div>Entry: <span id="entry-price">$98,200</span></div>
                <div>Target: <span id="target-price">$102,500</span></div>
            </div>
        </div>
    </div>

    <button class="footer-btn" id="action-btn" onclick="closeApp()">CLOSE APP</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const translations = {
            en: {
                subtitle: "WE DECODE THE MARKET",
                signal: "BUY / LONG",
                action: "CLOSE APP"
            },
            fa: {
                subtitle: "ما بازار را رمزگشایی می‌کنیم",
                signal: "خرید / لانگ",
                action: "بستن برنامه"
            },
            bs: {
                subtitle: "DEKODIRAMO TRŽIŠTE",
                signal: "KUPI / LONG",
                action: "ZATVORI"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            document.getElementById('signal-type').innerText = translations[lang].signal;
            document.getElementById('action-btn').innerText = translations[lang].action;
            
            if(lang === 'fa') {
                document.body.style.direction = 'rtl';
            } else {
                document.body.style.direction = 'ltr';
            }
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
