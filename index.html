<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMIND PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; margin: 0; padding-bottom: 70px; }
        .tab-content { display: none; padding: 20px; }
        .active-tab { display: block; }
        
        .navbar { position: fixed; bottom: 0; width: 100%; display: flex; background: #151a22; border-top: 1px solid #222c3a; }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; }
        .nav-btn.active { color: #00e676; border-top: 2px solid #00e676; }
        
        .card { background: #151a22; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="crypto" class="tab-content active-tab">
        <h2>Crypto Market</h2>
        <div class="card">BTC/USDT: <span id="btc-price">...</span></div>
        <div class="card">ETH/USDT: <span id="eth-price">...</span></div>
    </div>

    <div id="forex" class="tab-content">
        <h2>Forex Analysis</h2>
        <div class="card">EUR/USD: 1.0850</div>
        <div class="card">GBP/USD: 1.2720</div>
    </div>

    <div id="news" class="tab-content">
        <h2>Latest News</h2>
        <iframe src="https://cryptopanic.com/widgets/news/?background=transparent&news_feed=recent&posts_limit=5"></iframe>
    </div>

    <div class="navbar">
        <div class="nav-btn active" onclick="showTab('crypto')">Crypto</div>
        <div class="nav-btn" onclick="showTab('forex')">Forex</div>
        <div class="nav-btn" onclick="showTab('news')">News</div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        // آپدیت قیمت‌ها
        async function updatePrices() {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT"]');
            const data = await res.json();
            document.getElementById('btc-price').innerText = '$' + parseFloat(data[0].price).toLocaleString();
            document.getElementById('eth-price').innerText = '$' + parseFloat(data[1].price).toLocaleString();
        }
        setInterval(updatePrices, 5000);
        updatePrices();
    </script>
</body>
</html>
