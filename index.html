<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMIND Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0e17; --card: #161c27; --accent: #00ff88; --text: #e2e8f0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* طراحی نئونی و حرفه‌ای */
        .glass-panel { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #2d3748; }
        .lang-box { text-align: center; margin-top: 10px; }
        .lang-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 15px; cursor: pointer; margin: 0 5px; }
        
        .tab-content { display: none; }
        .active { display: block; }
        
        .nav-fixed { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: #718096; font-size: 12px; }
        .nav-item.active { color: var(--accent); }
        
        iframe { width: 100%; height: 450px; border-radius: 15px; border: none; }
        h2 { color: var(--accent); text-align: center; }
    </style>
</head>
<body>

    <div class="lang-box">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('fa')">FA</button>
        <button class="lang-btn" onclick="setLang('bs')">BS</button>
    </div>

    <div id="crypto" class="tab-content active">
        <h2><i class="fas fa-chart-line"></i> <span id="t-market">Market Charts</span></h2>
        <div class="glass-panel">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js">
            { "symbol": "BTCUSDT", "theme": "dark", "height": 400, "width": "100%", "interval": "60" }
            </script>
        </div>
    </div>

    <div id="news" class="tab-content">
        <h2><i class="fas fa-newspaper"></i> <span id="t-news">Live News</span></h2>
        <div class="glass-panel">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js">
            { "feedMode": "market", "market": "crypto", "height": 400, "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div id="learn" class="tab-content">
        <h2><i class="fas fa-graduation-cap"></i> <span id="t-learn">Academy</span></h2>
        <div class="glass-panel" id="learn-content">
            <h3>Basic Trading</h3>
            <p>Learn how to analyze market trends like a professional.</p>
        </div>
    </div>

    <div class="nav-fixed">
        <div class="nav-item active" onclick="show('crypto')"><i class="fas fa-chart-pie"></i><br>Market</div>
        <div class="nav-item" onclick="show('news')"><i class="fas fa-rss"></i><br>News</div>
        <div class="nav-item" onclick="show('learn')"><i class="fas fa-book"></i><br>Academy</div>
    </div>

<script>
    const tr = {
        en: { market: "Market Charts", news: "Live News", learn: "Academy", desc: "Learn how to analyze market trends like a professional." },
        fa: { market: "نمودارهای بازار", news: "اخبار زنده", learn: "آکادمی آموزش", desc: "یاد بگیرید چطور مثل یک حرفه‌ای بازار را تحلیل کنید." },
        bs: { market: "Tržišni grafikoni", news: "Vijesti uživo", learn: "Akademija", desc: "Naučite kako analizirati trendove kao profesionalac." }
    };

    function setLang(lang) {
        document.getElementById('t-market').innerText = tr[lang].market;
        document.getElementById('t-news').innerText = tr[lang].news;
        document.getElementById('t-learn').innerText = tr[lang].learn;
        document.querySelector('#learn-content p').innerText = tr[lang].desc;
    }

    function show(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
    
    window.Telegram.WebApp.expand();
</script>
</body>
</html>
