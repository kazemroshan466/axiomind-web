<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AXIOMIND MASTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #101010; --accent: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .tab-content { display: none; padding: 10px; }
        .active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: #aaa; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .widget-box { height: 75vh; width: 100%; border-radius: 15px; overflow: hidden; }
        .lang-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="crypto-tab" class="tab-content active">
        <h3 style="text-align:center">🚀 Crypto Market (100+)</h3>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
            { "width": "100%", "height": "100%", "defaultColumn": "overview", "screener_type": "crypto_mkt", "displayCurrency": "USD", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div id="forex-tab" class="tab-content">
        <h3 style="text-align:center">🌐 Forex Market (100+)</h3>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
            { "width": "100%", "height": "100%", "defaultColumn": "overview", "screener_type": "forex_mkt", "displayCurrency": "USD", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div id="news-tab" class="tab-content">
        <h3 style="text-align:center">📰 Global News</h3>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js">
            { "feedMode": "all_symbols", "colorTheme": "dark", "height": "100%", "width": "100%" }
            </script>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="openTab('crypto-tab')"><i class="fas fa-coins"></i><br>Crypto</div>
        <div class="nav-item" onclick="openTab('forex-tab')"><i class="fas fa-globe"></i><br>Forex</div>
        <div class="nav-item" onclick="openTab('news-tab')"><i class="fas fa-newspaper"></i><br>News</div>
    </div>

    <script>
        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
