<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AXIOMIND MASTER</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div id="language-screen">

    <div class="language-box">

        <h1>AXIOMIND MASTER</h1>

        <p>Select Language</p>

        <button onclick="setLanguage('fa')">
            🇮🇷 فارسی
        </button>

        <button onclick="setLanguage('en')">
            🇬🇧 English
        </button>

        <button onclick="setLanguage('bs')">
            🇧🇦 Bosanski
        </button>

    </div>

</div>

<div id="app" style="display:none;">

<header>

    <div class="logo">
        AXIOMIND MASTER
    </div>

    <div class="subscription-badge">
        VIP
    </div>

</header>

<section class="hero">

    <h2 id="welcome-text">
        Welcome
    </h2>

    <p>
        AI Powered Crypto & Forex Signals
    </p>

</section>

<div class="cards">

    <div class="card">
        <i class="fas fa-robot"></i>
        <h3>AI Analysis</h3>
    </div>

    <div class="card">
        <i class="fas fa-coins"></i>
        <h3>Crypto</h3>
    </div>

    <div class="card">
        <i class="fas fa-chart-line"></i>
        <h3>Forex</h3>
    </div>

    <div class="card">
        <i class="fas fa-newspaper"></i>
        <h3>News</h3>
    </div>

    <div class="card">
        <i class="fas fa-graduation-cap"></i>
        <h3>Academy</h3>
    </div>

    <div class="card">
        <i class="fas fa-user"></i>
        <h3>Profile</h3>
    </div>

</div>

<section class="signals">

    <h2>Premium Signals</h2>

    <div class="signal-card buy">

        <h3>BTC/USDT</h3>

        <span class="signal-type">
            BUY
        </span>

        <p>Entry: 105000</p>

        <p>TP1: 106500</p>

        <p>TP2: 108000</p>

        <p>SL: 103500</p>

    </div>

</section>

<nav class="bottom-nav">

    <button>
        <i class="fas fa-home"></i>
    </button>

    <button>
        <i class="fas fa-chart-line"></i>
    </button>

    <button>
        <i class="fas fa-robot"></i>
    </button>

    <button>
        <i class="fas fa-newspaper"></i>
    </button>

    <button>
        <i class="fas fa-user"></i>
    </button>

</nav>

</div>

<script src="app.js"></script>

</body>
</html>
