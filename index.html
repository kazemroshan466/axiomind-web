<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AXIOMIND AI TRADING</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --bg: #050505; --neon: #00ff88; --card: #101010; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        .signal-card { background: var(--card); border: 1px solid var(--neon); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .lang-btn { background: #222; color: #fff; border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; margin: 5px; }
        .chart-placeholder { width: 100%; height: 200px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 1px dashed var(--neon); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; font-size: 12px; }
        .ai-text { font-size: 13px; color: #ccc; line-height: 1.6; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('fa')">FA</button>
        <button class="lang-btn" onclick="setLang('bs')">BS</button>
    </div>

    <div class="signal-card">
        <div style="display:flex; justify-content: space-between;">
            <h2 id="pair">BTC/USDT <i class="fas fa-bitcoin" style="color:#f7931a"></i></h2>
            <span style="color:var(--neon)">STRONG BUY</span>
        </div>
        
        <div class="chart-placeholder">
            <i class="fas fa-image" style="font-size: 40px; color:#555"></i>
            <span style="margin-left:10px">Live AI Chart Analysis</span>
        </div>

        <div class="stats">
            <div>Entry: 98,400</div>
            <div>TP: 105,000</div>
            <div>SL: 96,000</div>
            <div>R/R: 1:3</div>
        </div>

        <p class="ai-text" id="ai-desc">
            <b>Analysis:</b> Price is bouncing from the major support level. AI confirms bullish divergence. Expect a move to the next resistance.
        </p>
    </div>

    <script>
        const texts = {
            en: { desc: "<b>Analysis:</b> Price is bouncing from the major support level. AI confirms bullish divergence. Expect a move to the next resistance." },
            fa: { desc: "<b>تحلیل:</b> قیمت در حال بازگشت از سطح حمایت اصلی است. هوش مصنوعی واگرایی صعودی را تایید می‌کند. انتظار حرکت به سمت مقاومت بعدی را داشته باشید." },
            bs: { desc: "<b>Analiza:</b> Cijena se odbija od glavnog nivoa podrške. AI potvrđuje bikovsku divergenciju." }
        };

        function setLang(lang) {
            document.getElementById('ai-desc').innerHTML = texts[lang].desc;
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
