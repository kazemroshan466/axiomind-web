<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMIND MASTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* استایل‌های نئونی و خفن */
        :root { --bg: #050505; --neon-green: #00ff88; --neon-blue: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding-bottom: 70px; }
        .tab-content { display: none; padding: 15px; }
        .active { display: block; }
        .widget-box { height: 70vh; border-radius: 20px; overflow: hidden; border: 1px solid var(--neon-green); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 2px solid var(--neon-blue); }
        .nav-item { flex: 1; text-align: center; color: #fff; cursor: pointer; }
        h2 { text-align: center; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div id="crypto" class="tab-content active">
        <h2><i class="fas fa-coins"></i> CRYPTO MARKET</h2>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
            { "width": "100%", "height": "100%", "screener_type": "crypto_mkt", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div id="forex" class="tab-content">
        <h2><i class="fas fa-globe"></i> FOREX MARKET</h2>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
            { "width": "100%", "height": "100%", "screener_type": "forex_mkt", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div id="news" class="tab-content">
        <h2><i class="fas fa-newspaper"></i> GLOBAL NEWS</h2>
        <div class="widget-box">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js">
            { "feedMode": "all_symbols", "colorTheme": "dark", "height": "100%", "width": "100%" }
            </script>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="show('crypto')"><i class="fas fa-bitcoin"></i><br>Crypto</div>
        <div class="nav-item" onclick="show('forex')"><i class="fas fa-chart-line"></i><br>Forex</div>
        <div class="nav-item" onclick="show('news')"><i class="fas fa-bell"></i><br>News</div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
